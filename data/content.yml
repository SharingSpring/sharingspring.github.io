########################### About ##################################
about:
  enable: true
  image: 'images/mpark.jpeg'
  title: 'Michelle Park (박우아)'
  content: I provide individual counseling in both English and Korean, working with clients from over 25 countries and a wide range of ethnic, cultural, social, and religious backgrounds. My experience spans diverse populations, including bi- and multicultural individuals, multicultural families, third culture individuals, U.S. veterans, expatriate families, exchange students, Korean adoptees, Korean returnees, local Korean nationals, and foreign professionals working in Korea. I have also collaborated with churches, international companies, and educational institutions, including international schools across South Korea. My clinical specialties include anxiety and panic disorders, depression, trauma and PTSD, ADHD, and grief counseling (including pet loss). I also support clients navigating life transitions and adjustment stress, identity development, intercultural challenges, interpersonal relationships, self-esteem, and career concerns. In addition, I provide parent education and guidance for parenting-related stress. [For more information](#contact)
  button:
